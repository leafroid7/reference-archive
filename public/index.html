<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H&B 케이스 스터디</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗃️</text></svg>">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Apple SD Gothic Neo', 'Pretendard', sans-serif; background: #f5f5f5; color: #333; }

    /* 헤더 */
    .header { background: white; padding: 16px 32px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .header h1 { font-size: 20px; font-weight: 700; }
    .edit-mode-btn { padding: 6px 14px; background: transparent; color: #888; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
    .edit-mode-btn.active { background: #fff8ec; color: #d97706; border-color: #f5c06a; font-weight: 600; }
    .filters { display: flex; flex-direction: column; gap: 8px; }
    .filters-row1 { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filters-row2 { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filter-select, .filter-date { padding: 7px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; background: white; cursor: pointer; }

    /* 브랜드 검색 필터 */
    .brand-filter-wrap { position: relative; }
    .brand-filter-input { padding: 7px 30px 7px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; background: white; cursor: text; min-width: 130px; }
    .brand-filter-input:focus { outline: none; border-color: #aaa; }
    .brand-filter-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #bbb; cursor: pointer; font-size: 14px; display: none; padding: 0; line-height: 1; }
    .brand-filter-clear.show { display: block; }
    .brand-filter-dropdown { position: absolute; top: calc(100% + 4px); left: 0; min-width: 180px; background: white; border: 1px solid #ddd; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); z-index: 200; display: none; overflow: hidden; }
    .brand-filter-dropdown.show { display: block; }
    .brand-filter-search-results { max-height: 160px; overflow-y: auto; padding: 4px; }
    .brand-filter-divider { height: 1px; background: #f0f0f0; margin: 4px 0; }
    .brand-filter-all-list { max-height: 160px; overflow-y: auto; padding: 4px; }
    .brand-filter-item { padding: 8px 12px; font-size: 13px; cursor: pointer; border-radius: 7px; display: flex; justify-content: space-between; align-items: center; }
    .brand-filter-item:hover { background: rgba(254,240,138,0.35); }
    .brand-filter-item.selected { background: #eff6ff; color: #3b82f6; font-weight: 600; }
    .brand-filter-section-label { font-size: 10px; color: #bbb; font-weight: 600; padding: 6px 12px 2px; letter-spacing: 0.5px; }
    .filter-btn { padding: 7px 14px; background: #333; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .filter-btn:hover { background: #555; }
    .filter-month-btn { padding: 7px 14px; background: #f0f0f0; color: #555; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .filter-month-btn:hover { background: #e0e0e0; }
    .reset-btn { padding: 7px 14px; background: transparent; color: #888; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 13px; }

    /* 정렬 드롭다운 */
    .sort-wrap { position: relative; }
    .sort-btn { padding: 7px 14px; background: transparent; color: #555; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
    .sort-btn.active { border-color: #888; color: #333; background: #f5f5f5; }
    .sort-dropdown { position: absolute; top: calc(100% + 4px); left: 0; background: white; border: 1px solid #ddd; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); z-index: 200; min-width: 180px; padding: 4px; display: none; }
    .sort-dropdown.show { display: block; }
    .sort-option { padding: 9px 14px; font-size: 13px; cursor: pointer; border-radius: 7px; display: flex; justify-content: space-between; align-items: center; }
    .sort-option:hover { background: rgba(254,240,138,0.35); }
    .sort-option.selected { color: #3b82f6; font-weight: 600; }
    .sort-option .sort-check { display: none; }
    .sort-option.selected .sort-check { display: inline; }

    /* 갤러리 */
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 24px 32px; align-items: start; }

    /* 카드 */
    .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; position: relative; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .card-media { width: 100%; background: #111; overflow: hidden; aspect-ratio: 4/3; position: relative; }
    .card-media img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-media .video-thumb { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #111; }
    .card-media .video-thumb .play-icon { width: 48px; height: 48px; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .card-media .no-media { display: flex; align-items: center; justify-content: center; height: 100%; color: #bbb; font-size: 14px; background: #f0f0f0; }
    .card-body { padding: 14px 16px; }
    .badge-row { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; margin-bottom: 8px; }
    .badge-divider { width: 1px; height: 14px; background: #ddd; margin: 0 2px; }
    .card-brand { background: #f0f0f0; color: #555; font-size: 11px; padding: 2px 8px; border-radius: 20px; }
    .card-type { background: #e8f4ff; color: #3b82f6; font-size: 11px; padding: 2px 8px; border-radius: 20px; }
    .card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
    .card-date { font-size: 11px; color: #bbb; margin-bottom: 8px; }
    .card-overview-label { font-size: 11px; color: #aaa; font-weight: 600; margin-bottom: 3px; }
    .card-overview { font-size: 13px; color: #555; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-tags { padding: 6px 16px 10px; display: flex; flex-wrap: wrap; gap: 4px; }
    .tag { font-size: 11px; color: #888; background: #f5f5f5; padding: 2px 8px; border-radius: 20px; }
    .card-reactions { padding: 10px 16px; border-top: 1px solid #f5f5f5; display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
    .reaction-total { font-size: 11px; color: #bbb; padding: 2px 6px; background: #f5f5f5; border-radius: 10px; margin-left: auto; white-space: nowrap; flex-shrink: 0; }
    .reaction-btn { display: flex; align-items: center; gap: 3px; padding: 3px 9px; border: 1px solid #eee; border-radius: 20px; background: white; cursor: pointer; font-size: 13px; transition: background 0.15s; }
    .reaction-btn:hover, .reaction-btn.active { background: #fff3f3; border-color: #ffb3b3; }
    .reaction-count { font-size: 11px; color: #888; }
    .add-reaction-btn { padding: 3px 9px; border: 1px dashed #ddd; border-radius: 20px; background: white; cursor: pointer; font-size: 15px; color: #bbb; }

    /* 이모지 피커 */
    .emoji-picker { display: none; position: fixed; background: white; border: 1px solid #eee; border-radius: 12px; padding: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); z-index: 99998; flex-wrap: wrap; gap: 6px; width: 220px; }
    .emoji-picker.show { display: flex; }
    .emoji-option { font-size: 20px; cursor: pointer; padding: 4px 6px; border-radius: 6px; }
    .emoji-option:hover { background: #f5f5f5; }

    /* 모달 오버레이 */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.show { display: flex !important; }

    /* 모달 본체 */
    .modal-wrap { position: relative; width: 100%; max-width: 960px; }
    .modal { background: white; border-radius: 16px; overflow: hidden; display: flex; max-height: 85vh; }

    /* 모달 좌측: 캐러셀 */
    .modal-left { flex: 0 0 55%; background: #111; position: relative; display: flex; flex-direction: column; min-height: 340px; }
    .carousel { flex: 1; overflow: hidden; position: relative; min-height: 200px; }
    .carousel-track { display: flex; height: 100%; transition: transform 0.3s ease; }
    .carousel-slide { flex: 0 0 100%; display: flex; align-items: center; justify-content: center; background: #111; }
    .carousel-slide img { max-width: 100%; max-height: 100%; object-fit: contain; cursor: zoom-in; display: block; }
    .carousel-slide iframe { width: 100%; aspect-ratio: 16/9; border: none; }
    .carousel-slide video { max-width: 100%; max-height: 100%; }
    .carousel-slide .no-media { color: #555; font-size: 14px; }
    .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); border: none; color: white; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; z-index: 5; transition: background 0.2s, transform 0.2s; }
    .carousel-btn:hover { background: rgba(255,255,255,0.85); color: #111; transform: translateY(-50%) scale(1.12); }
    .carousel-btn.prev { left: 10px; }
    .carousel-btn.next { right: 10px; }
    .carousel-btn.hidden { display: none; }
    .carousel-footer { background: #111; padding: 8px 0; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .carousel-counter { color: rgba(255,255,255,0.6); font-size: 11px; }
    .carousel-dots { display: flex; gap: 6px; }
    .carousel-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; transition: background 0.2s; border: none; padding: 0; }
    .carousel-dot.active { background: white; }

    /* 모달 우측 */
    .modal-right { flex: 1; overflow-y: auto; padding: 28px 24px; position: relative; }
    .modal-close { position: absolute; top: 14px; right: 14px; font-size: 14px; cursor: pointer; color: #999; background: #f0f0f0; border: none; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; z-index: 5; }
    .modal-close:hover { background: #e0e0e0; color: #333; }
    .modal-badge-row { margin-bottom: 12px; padding-right: 36px; }
    .modal-badge-group { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; margin-bottom: 4px; }
    .modal-badge-label { font-size: 11px; color: #aaa; font-weight: 600; margin-right: 4px; }
    .modal-title { font-size: 17px; font-weight: 700; line-height: 1.4; margin-bottom: 4px; }
    .modal-date { font-size: 12px; color: #bbb; margin-bottom: 16px; }
    .modal-overview-label { font-size: 11px; color: #aaa; font-weight: 600; letter-spacing: 0.3px; margin-bottom: 5px; }
    .modal-overview { font-size: 14px; color: #444; line-height: 1.7; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #f0f0f0; }
    .modal-source { margin-bottom: 14px; }
    .modal-source a { font-size: 13px; color: #3b82f6; word-break: break-all; text-decoration: none; }
    .modal-source a:hover { text-decoration: underline; }
    .modal-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 16px; }

    /* 토글 */
    .toggle-section { border: 1px solid #eee; border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
    .toggle-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; cursor: pointer; background: #fafafa; font-size: 13px; font-weight: 600; color: #444; user-select: none; border: none; width: 100%; text-align: left; }
    .toggle-header:hover { background: #f0f0f0; }
    .toggle-arrow { font-size: 10px; color: #aaa; transition: transform 0.2s; }
    .toggle-arrow.open { transform: rotate(180deg); }
    .toggle-body { padding: 12px 16px; font-size: 13px; color: #555; line-height: 1.7; display: none; }
    .toggle-body.open { display: block; }

    /* 본문 텍스트 블록 */
    .block-text { white-space: pre-wrap; margin-bottom: 4px; }
    .block-heading { font-weight: 700; margin: 8px 0 4px; }
    .block-heading-1 { font-size: 15px; }
    .block-heading-2 { font-size: 14px; }
    .block-heading-3 { font-size: 13px; }
    .block-bulleted { padding-left: 14px; position: relative; margin-bottom: 3px; }
    .block-bulleted::before { content: "•"; position: absolute; left: 4px; color: #aaa; }
    .block-quote { border-left: 3px solid #eee; padding-left: 10px; color: #777; font-style: italic; margin: 4px 0; }

    /* 편집 모드 - 인라인 편집 */
    .field-row { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 4px; }
    .field-edit-btn { flex-shrink: 0; background: none; border: none; cursor: pointer; font-size: 13px; color: #ccc; padding: 2px 4px; border-radius: 4px; transition: color 0.15s; }
    .field-edit-btn:hover { color: #888; }
    .inline-edit-wrap { margin-bottom: 12px; }
    .inline-edit-wrap textarea, .inline-edit-wrap input { width: 100%; border: 1px solid #d0d0d0; border-radius: 8px; padding: 8px 10px; font-size: 14px; font-family: inherit; resize: vertical; background: #fafafa; }
    .inline-edit-wrap textarea:focus, .inline-edit-wrap input:focus { outline: none; border-color: #aaa; background: white; }
    .inline-edit-actions { display: flex; gap: 6px; margin-top: 6px; }
    .inline-save-btn { padding: 5px 14px; background: #333; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .inline-cancel-btn { padding: 5px 10px; background: transparent; color: #888; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 12px; }

    /* 편집 모드 미디어 관리 */
    .edit-media-section { margin-top: 16px; border-top: 1px solid #f0f0f0; padding-top: 14px; }
    .edit-media-section label { font-size: 11px; color: #aaa; font-weight: 600; display: block; margin-bottom: 8px; }
    .edit-media-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
    .edit-media-item { display: flex; align-items: center; gap: 6px; background: #fafafa; border: 1px solid #eee; border-radius: 8px; padding: 6px 10px; cursor: grab; }
    .edit-media-item.dragging { opacity: 0.4; }
    .edit-media-item.drag-over { border-top: 2px solid #aaa; }
    .edit-media-thumb { width: 36px; height: 36px; object-fit: cover; border-radius: 4px; background: #111; flex-shrink: 0; }
    .edit-media-url { flex: 1; font-size: 11px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .edit-media-remove { background: none; border: none; color: #ccc; cursor: pointer; font-size: 14px; }
    .edit-media-remove:hover { color: #e55; }
    .edit-media-add-input { display: flex; gap: 6px; }
    .edit-media-add-input input { flex: 1; border: 1px solid #eee; border-radius: 8px; padding: 7px 10px; font-size: 13px; }
    .edit-media-add-btn { padding: 7px 12px; background: #f0f0f0; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; color: #555; }
    .edit-media-add-btn:hover { background: #e5e5e5; }
    .edit-media-save-btn { width: 100%; margin-top: 8px; padding: 8px; background: #333; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }

    /* 잠금 해제 모달 */
    .unlock-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99999; align-items: center; justify-content: center; }
    .unlock-overlay.show { display: flex !important; }
    .unlock-modal { background: white; border-radius: 16px; padding: 28px; width: 300px; text-align: center; }
    .unlock-modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
    .unlock-modal p { font-size: 13px; color: #888; margin-bottom: 16px; }
    .unlock-input { width: 100%; border: 1px solid #eee; border-radius: 8px; padding: 10px 12px; font-size: 14px; margin-bottom: 10px; box-sizing: border-box; text-align: center; letter-spacing: 2px; }
    .unlock-input:focus { outline: none; border-color: #aaa; }
    .unlock-btn { width: 100%; padding: 10px; background: #333; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .unlock-error { font-size: 12px; color: #e55; margin-top: 8px; display: none; }

    /* 이미지 확대 */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 99999; overflow-y: auto; }
    .lightbox.show { display: block !important; }
    .lightbox-inner { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 64px 24px; box-sizing: border-box; }
    .lightbox img { border-radius: 4px; display: block; transition: width 0.2s; }
    .lightbox img.fit-screen { max-width: min(96vw, 1200px); max-height: 88vh; width: auto; height: auto; object-fit: contain; }
    .lightbox img.zoom-original { max-width: none; width: auto; height: auto; }
    .lightbox img.zoom-in { max-width: none; width: 150%; height: auto; }
    .lightbox-close { position: fixed; top: 14px; right: 18px; color: white; font-size: 18px; cursor: pointer; background: rgba(0,0,0,0.6); border: none; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; z-index: 100000; }
    .lightbox-controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 100000; }
    .lightbox-ctrl-btn { padding: 7px 14px; background: rgba(120,100,200,0.45); color: white; border: 1px solid rgba(160,140,220,0.5); border-radius: 20px; cursor: pointer; font-size: 12px; backdrop-filter: blur(6px); transition: background 0.15s; white-space: nowrap; }
    .lightbox-ctrl-btn:hover { background: rgba(120,100,200,0.72); }
    .lightbox-ctrl-btn.active { background: rgba(110,85,200,0.9); border-color: rgba(160,140,255,0.8); }

    /* 반응형 */
    @media (max-width: 700px) {
      .modal { flex-direction: column; height: 90vh; overflow: hidden; }
      .modal-left { flex: 0 0 42%; min-height: 0; overflow: hidden; }
      .modal-right { flex: 1; overflow-y: auto; padding: 16px; min-height: 0; }
      .carousel { height: 100%; }
      .gallery { padding: 16px; gap: 14px; }
      .header { padding: 12px 16px; }
    }


    /* 카드 추가 모달 */
    .add-card-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9000; align-items: center; justify-content: center; padding: 20px; }
    .add-card-overlay.show { display: flex !important; }
    .add-card-modal { background: white; border-radius: 16px; padding: 28px; width: 100%; max-width: 540px; max-height: 88vh; overflow-y: auto; }
    .add-card-modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
    .add-field { margin-bottom: 14px; }
    .add-field label { display: block; font-size: 12px; color: #888; font-weight: 600; margin-bottom: 5px; }
    .add-field input, .add-field textarea, .add-field select {
      width: 100%; border: 1px solid #eee; border-radius: 8px; padding: 9px 12px;
      font-size: 14px; font-family: inherit; box-sizing: border-box; background: white;
    }
    .add-field textarea { min-height: 70px; resize: vertical; }
    .add-field input:focus, .add-field textarea:focus { outline: none; border-color: #bbb; }
    .add-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
    .add-save-btn { padding: 9px 20px; background: #333; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .add-cancel-btn { padding: 9px 16px; background: transparent; color: #888; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .add-floating-btn { position: fixed; bottom: 28px; right: 28px; background: #333; color: white; border: none; border-radius: 50%; width: 52px; height: 52px; font-size: 24px; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.2); display: none; z-index: 200; transition: background 0.2s; align-items: center; justify-content: center; }
    .add-floating-btn.show { display: flex; }
    .add-floating-btn:hover { background: #555; }

    /* 브랜드명 자동완성 */
    .autocomplete-wrap { position: relative; }
    .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ddd; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); z-index: 100; display: none; padding: 6px; }
    .autocomplete-list.show { display: block; }
    .autocomplete-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; cursor: pointer; font-size: 13px; border-radius: 7px; transition: background 0.12s; }
    .autocomplete-item:hover { background: rgba(254,240,138,0.35); }
    .autocomplete-item .ac-hint { font-size: 11px; color: #bbb; display: none; }
    .autocomplete-item:hover .ac-hint { display: inline; }
    .autocomplete-new { color: #3b82f6; font-style: italic; }
    .autocomplete-new .ac-hint { color: #93c5fd; }

    /* 이미지 URL 입력 */
    .media-url-list { margin-top: 6px; }
    .media-url-item { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; cursor: grab; }
    .media-url-item.dragging { opacity: 0.4; }
    .media-url-item.drag-over { border-top: 2px solid #aaa; }
    .drag-handle { color: #ccc; font-size: 16px; cursor: grab; padding: 0 2px; user-select: none; }
    .media-url-item input { flex: 1; }
    .media-url-remove { background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px; padding: 0 4px; }
    .media-url-remove:hover { color: #e55; }

<script>
const API_BASE = '/api/notion';
const DEFAULT_REACTIONS = ['❤️', '👍', '👏', '🔥', '💡'];
const EXTRA_EMOJIS = ['😍', '🎯', '👀', '💎', '🙌', '✨', '📊', '😮', '📌', '💬'];
const EDIT_CODE = 'underdogvibe';

let allPages = [];
let reactionData = JSON.parse(localStorage.getItem('reactions') || '{}');
let carouselIndex = 0;
let carouselItems = [];
let touchStartX = 0;
let isEditMode = false;
let currentModalPageId = null;

function saveReactions() { localStorage.setItem('reactions', JSON.stringify(reactionData)); }

async function syncReactionToNotion(pageId, emoji, delta) {
  try {
    const res = await fetch('/api/notion?action=updateReaction', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pageId, emoji, delta })
    });
    const data = await res.json();
    if (data.success) {
      // allPages 캐시 업데이트
      const page = allPages.find(p => p._id === pageId);
      if (page) {
        if (typeof data.total === 'number') {
          if (!page.properties['공감수']) page.properties['공감수'] = { number: 0 };
          page.properties['공감수'].number = data.total;
        }
        if (data.detail) {
          // 공감 상세 캐시 업데이트 → 이모지별 카운트 즉시 반영
          if (!page.properties['공감 상세']) page.properties['공감 상세'] = { rich_text: [] };
          page.properties['공감 상세'].rich_text = [{ plain_text: JSON.stringify(data.detail) }];
        }
      }
    }
  } catch (e) {
    console.warn('공감 Notion 동기화 실패:', e);
  }
}

// ── 편집 모드 ──────────────────────────────────────────
function activateEditMode() {
  isEditMode = true;
  const btn = document.getElementById('editModeBtn');
  btn.textContent = '📖 읽기 모드';

  if (currentModalPageId) openModal(currentModalPageId);
}

function deactivateEditMode() {
  isEditMode = false;
  const btn = document.getElementById('editModeBtn');
  btn.textContent = '✏️ 편집 모드';
  btn.classList.remove('active');
  document.getElementById('addFloatingBtn').classList.remove('show');
  renderGallery(allPages);
  if (currentModalPageId) openModal(currentModalPageId);
}

document.getElementById('editModeBtn').addEventListener('click', () => {
  if (isEditMode) { deactivateEditMode(); return; }
  const overlay = document.getElementById('unlockOverlay');
  overlay.classList.add('show');
  document.getElementById('unlockInput').value = '';
  document.getElementById('unlockError').style.display = 'none';
  setTimeout(() => document.getElementById('unlockInput').focus(), 100);
});

document.getElementById('unlockOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('unlockOverlay'))
    document.getElementById('unlockOverlay').classList.remove('show');
});

document.getElementById('unlockSubmit').addEventListener('click', () => {
  if (document.getElementById('unlockInput').value.trim() === EDIT_CODE) {
    document.getElementById('unlockOverlay').classList.remove('show');
    activateEditMode();
  } else {
    document.getElementById('unlockError').style.display = 'block';
  }
});

document.getElementById('unlockInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('unlockSubmit').click();
});

// ── 이벤트 바인딩 ──────────────────────────────────────────
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

document.getElementById('prevBtn').addEventListener('click', () => moveCarousel(-1));
document.getElementById('nextBtn').addEventListener('click', () => moveCarousel(1));

// 캐러셀 터치
const carouselEl = document.getElementById('carousel');
carouselEl.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
carouselEl.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].screenX;
  if (Math.abs(diff) > 40) moveCarousel(diff > 0 ? 1 : -1);
});

// 캐러셀 마우스 드래그
let mouseStartX = 0, isDragging = false;
document.addEventListener('mousedown', e => {
  if (e.target.closest('#carousel')) { mouseStartX = e.clientX; isDragging = true; }
});
document.addEventListener('mouseup', e => {
  if (!isDragging) return;
  isDragging = false;
  const diff = mouseStartX - e.clientX;
  if (Math.abs(diff) > 40) moveCarousel(diff > 0 ? 1 : -1);
});

// 라이트박스
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox') || e.target.closest('.lightbox-inner') === document.getElementById('lightbox').querySelector('.lightbox-inner') && e.target.tagName !== 'IMG') closeLightbox();
});
document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
document.getElementById('lbFit').addEventListener('click', e => { e.stopPropagation(); setLightboxZoom('fit'); });
document.getElementById('lbOriginal').addEventListener('click', e => { e.stopPropagation(); setLightboxZoom('original'); });
document.getElementById('lbZoomIn').addEventListener('click', e => { e.stopPropagation(); setLightboxZoom('zoomin'); });

document.addEventListener('click', e => {

// ── 데이터 로드 ──────────────────────────────────────────

// ── 정렬 ──────────────────────────────────────────
let currentSort = 'date_desc';

function toggleSortDropdown() {
  document.getElementById('sortDropdown').classList.toggle('show');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.sort-wrap'))
    document.getElementById('sortDropdown').classList.remove('show');
});

function applySort(sort) {
  currentSort = sort;
  const labels = { date_desc: '날짜 최신순', date_asc: '날짜 오래된순', reaction_desc: '공감 많은순' };
  document.getElementById('sortLabel').textContent = labels[sort];
  document.querySelectorAll('.sort-option').forEach(el => {
    el.classList.toggle('selected', el.dataset.sort === sort);
  });
  document.getElementById('sortBtn').classList.add('active');
  document.getElementById('sortDropdown').classList.remove('show');
  // 모든 정렬 방식 동일하게 처음부터 다시 로드
  loadPages(currentFilters.brand, currentFilters.dateStart, currentFilters.dateEnd);
}

// ── 전체 텍스트 검색 ──────────────────────────────────────────
let textSearchQuery = '';
let textSearchDebounce = null;

function getPageSearchText(page) {
  const p = page.properties;
  const parts = [
    p['콘텐츠']?.title?.map(t => t.plain_text).join('') || '',
    p['브랜드명']?.select?.name || '',
    p['브랜드 개요']?.rich_text?.map(t => t.plain_text).join('') || '',
    p['주목할 캠페인/콘텐츠']?.rich_text?.map(t => t.plain_text).join('') || '',
    p['성공/실패 핵심 요인']?.rich_text?.map(t => t.plain_text).join('') || '',
    p['적용해 볼 아이디어']?.rich_text?.map(t => t.plain_text).join('') || '',
    p['인사이트 (내가 배운 것)']?.rich_text?.map(t => t.plain_text).join('') || '',
    (p['태그']?.multi_select || []).map(t => t.name).join(' '),
  ];
  return parts.join(' ').toLowerCase();
}

function applyTextSearch() {
  const q = textSearchQuery.toLowerCase().trim();
  if (!q) {
    // 검색어 없으면 전체 카드 표시
    document.querySelectorAll('#gallery .card').forEach(c => c.style.display = '');
    return;
  }
  document.querySelectorAll('#gallery .card').forEach(card => {
    const pageId = card.dataset.pageId;
    const page = allPages.find(p => p._id === pageId);
    if (!page) { card.style.display = 'none'; return; }
    card.style.display = getPageSearchText(page).includes(q) ? '' : 'none';
  });
}

function renderTextSearchDropdown(q) {
  const dropdown = document.getElementById('textSearchDropdown');
  if (!q) { dropdown.classList.remove('show'); return; }
  const ql = q.toLowerCase();
  // 로드된 카드 중 매칭 상위 6개 추천
  const matches = allPages
    .filter(p => getPageSearchText(p).includes(ql))
    .slice(0, 6);
  if (!matches.length) { dropdown.classList.remove('show'); return; }
  const highlight = (text, q) => {
    if (!text) return '';
    const idx = text.toLowerCase().indexOf(q);
    if (idx < 0) return text.replace(/</g,'&lt;');
    return text.slice(0, idx).replace(/</g,'&lt;') +
      '<mark>' + text.slice(idx, idx + q.length).replace(/</g,'&lt;') + '</mark>' +
      text.slice(idx + q.length).replace(/</g,'&lt;');
  };
  dropdown.innerHTML = matches.map(p => {
    const title = p.properties['콘텐츠']?.title?.map(t => t.plain_text).join('') || '(제목 없음)';
    const brand = p.properties['브랜드명']?.select?.name || '';
    return `<div class="text-search-item" onclick="selectTextSearchResult('${p._id}')">
      ${highlight(title, q)}${brand ? `<span class="ts-brand">${brand}</span>` : ''}
    </div>`;
  }).join('');
  dropdown.classList.add('show');
}

function selectTextSearchResult(pageId) {
  document.getElementById('textSearchDropdown').classList.remove('show');
  openModal(pageId);
}

function clearTextSearch() {
  textSearchQuery = '';
  document.getElementById('textSearchInput').value = '';
  document.getElementById('textSearchClear').classList.remove('show');
  document.getElementById('textSearchDropdown').classList.remove('show');
  applyTextSearch();
}

document.getElementById('textSearchInput').addEventListener('input', e => {
  textSearchQuery = e.target.value;
  document.getElementById('textSearchClear').classList.toggle('show', !!textSearchQuery);
  clearTimeout(textSearchDebounce);
  textSearchDebounce = setTimeout(() => {
    renderTextSearchDropdown(textSearchQuery);
    applyTextSearch();
  }, 200);
});

document.getElementById('textSearchInput').addEventListener('keydown', e => {
  if (e.key === 'Escape') clearTextSearch();
});

document.getElementById('textSearchClear').addEventListener('click', clearTextSearch);

document.addEventListener('click', e => {
  if (!e.target.closest('.text-search-wrap'))
    document.getElementById('textSearchDropdown').classList.remove('show');
});

async function loadBrands() {
  try {
    const res = await fetch(`${API_BASE}?action=getBrands`);
    const data = await res.json();
    allBrandNames = (data.brands || []).map(b => b.name);
    renderBrandAllList();
  } catch(e) { console.error(e); }
}

let selectedBrand = '';

function renderBrandAllList() {
  const list = document.getElementById('brandAllList');
  list.innerHTML = [
    `<div class="brand-filter-item ${selectedBrand===''?'selected':''}" onclick="selectBrandFilter('')">전체 브랜드</div>`,
    ...allBrandNames.map(name =>
      `<div class="brand-filter-item ${selectedBrand===name?'selected':''}" onclick="selectBrandFilter('${name}')">${name}</div>`)
  ].join('');
}

function renderBrandSearchResults(query) {
  const results = document.getElementById('brandSearchResults');
  const divider = document.getElementById('brandFilterDivider');
  if (!query) { results.innerHTML = ''; divider.style.display = 'none'; return; }
  divider.style.display = 'block';
  const matches = allBrandNames.filter(b => b.toLowerCase().includes(query.toLowerCase()));
  results.innerHTML = matches.length
    ? ['<div class="brand-filter-section-label">검색 결과</div>',
       ...matches.map(name => `<div class="brand-filter-item ${selectedBrand===name?'selected':''}" onclick="selectBrandFilter('${name}')">${name}</div>`)
      ].join('')
    : '<div style="padding:8px 12px;font-size:12px;color:#bbb;">검색 결과 없음</div>';
}

function selectBrandFilter(name) {
  selectedBrand = name;
  document.getElementById('brandFilter').value = name;
  document.getElementById('brandFilterInput').value = name || '';
  document.getElementById('brandFilterClear').classList.toggle('show', !!name);
  document.getElementById('brandFilterDropdown').classList.remove('show');
  renderBrandAllList();
}

// 브랜드 필터 이벤트
document.getElementById('brandFilterInput').addEventListener('focus', () => {
  renderBrandAllList();
  renderBrandSearchResults(document.getElementById('brandFilterInput').value);
  document.getElementById('brandFilterDropdown').classList.add('show');
});

document.getElementById('brandFilterInput').addEventListener('input', function() {
  renderBrandSearchResults(this.value);

// ── 카피 유형 버튼 선택 ──────────────────────────────────────────
let allCopyTypes = [];
let selectedCopyTypes = new Set();

function renderCopyTypeButtons(selected) {
  selectedCopyTypes = new Set(selected);
  const wrap = document.getElementById('ac-copytypes-wrap');
  if (!wrap) return;
  wrap.innerHTML = allCopyTypes.map(ct => {
    const sel = selectedCopyTypes.has(ct);
    return `<button type="button" onclick="toggleCopyType('${ct}')"
      style="padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid ${sel?'#3b82f6':'#ddd'};background:${sel?'#eff6ff':'white'};color:${sel?'#3b82f6':'#666'};transition:all 0.15s;">${ct}</button>`;
  }).join('');
  document.getElementById('ac-copytypes').value = [...selectedCopyTypes].join(',');
}

function toggleCopyType(ct) {
  if (selectedCopyTypes.has(ct)) selectedCopyTypes.delete(ct);
  else selectedCopyTypes.add(ct);
  renderCopyTypeButtons([...selectedCopyTypes]);
}

let nextCursor = null;
let hasMore = false;
let currentFilters = { brand: '', dateStart: '', dateEnd: '' };
const PAGE_SIZE = 20;

async function loadPages(brandFilter='', dateStart='', dateEnd='') {
  currentFilters = { brand: brandFilter, dateStart, dateEnd };
  nextCursor = null;
  allPages = [];
  document.getElementById('gallery').innerHTML = '<div class="loading">로딩 중...</div>';
  await fetchMorePages(true);
}

async function fetchMorePages(isFirst = false) {
  try {
    const sortDir = currentSort === 'date_asc' ? 'ascending' : 'descending';
    let url = `${API_BASE}?action=getPages&page_size=${PAGE_SIZE}&sort_dir=${sortDir}`;
    if (currentFilters.brand) url += `&filter_brand=${encodeURIComponent(currentFilters.brand)}`;
    if (currentFilters.dateStart) url += `&filter_date_start=${currentFilters.dateStart}`;
    if (currentFilters.dateEnd) url += `&filter_date_end=${currentFilters.dateEnd}`;
    if (nextCursor) url += `&start_cursor=${nextCursor}`;

    const res = await fetch(url);
    const data = await res.json();
    const newPages = (data.pages || []).map(p => ({ ...p, _id: p.id.replace(/-/g, '') }));

    if (isFirst) allPages = newPages;
    else allPages = [...allPages, ...newPages];

    nextCursor = data.next_cursor || null;
    hasMore = data.has_more || false;

    // 카피 유형 목록 동기화
    const ctSet = new Set(allCopyTypes);
    allPages.forEach(p => (p.properties['카피 유형']?.multi_select || []).forEach(t => ctSet.add(t.name)));
    allCopyTypes = [...ctSet];

    if (currentSort === 'reaction_desc') {
      // 공감 정렬: 더보기 없이 전체 로드 후 클라이언트 정렬
      if (hasMore) {
        // 아직 더 있으면 계속 fetch
        await fetchMorePages(false);
        return;
      }
      const sorted = [...allPages].sort((a, b) => getTotalReactions(b._id) - getTotalReactions(a._id));
      renderGallery(sorted, false);
    } else {
      if (isFirst) renderGallery(allPages, false);
      else renderGallery(newPages, true);
    }
  } catch(e) {
    if (isFirst) document.getElementById('gallery').innerHTML = `<div class="error">데이터 로드 실패: ${e.message}</div>`;
  }
}

// ── 미디어 추출 ──────────────────────────────────────────
function getYouTubeId(url) {
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

function extractAllMedia(blocks) {
  const items = [];
  for (const block of blocks) {
    if (block.type === 'image') {
      const url = block.image?.file?.url || block.image?.external?.url;
      if (url) items.push({ type: 'image', url });
    } else if (block.type === 'video') {
      const url = block.video?.file?.url || block.video?.external?.url || '';
      const ytId = getYouTubeId(url);
      if (ytId) items.push({ type: 'youtube', id: ytId });
      else if (url) items.push({ type: 'video', url });
    } else if (block.type === 'embed') {
      const url = block.embed?.url || '';
      const ytId = getYouTubeId(url);
      if (ytId) items.push({ type: 'youtube', id: ytId });
      else if (url) items.push({ type: 'embed', url });
    } else if (block.type === 'bookmark') {
      // 노션에서 링크 붙여넣기 → 임베드 전환 시 bookmark 타입으로 올 수 있음
      const url = block.bookmark?.url || '';
      const ytId = getYouTubeId(url);
      if (ytId) items.push({ type: 'youtube', id: ytId });
    } else if (block.type === 'link_preview') {
      const url = block.link_preview?.url || '';
      const ytId = getYouTubeId(url);
      if (ytId) items.push({ type: 'youtube', id: ytId });
    } else if (block.type === 'paragraph') {
      const text = block.paragraph?.rich_text?.map(t => t.plain_text).join('') || '';
      const ytId = getYouTubeId(text);
      if (ytId) items.push({ type: 'youtube', id: ytId });
    } else if (block.type === 'column_list' || block.type === 'column') {
      if (block.children?.length) items.push(...extractAllMedia(block.children));
    }
  }
  return items;
}

function extractFirstMedia(blocks) {
  return extractAllMedia(blocks)[0] || null;
}

// 카드 썸네일용 - 영상은 플레이 아이콘으로 표시
function buildCardMediaHTML(media) {
  if (!media) return '<div class="no-media">미디어 없음</div>';
  if (media.type === 'image') return `<img src="${media.url}" loading="lazy" alt="">`;
  if (media.type === 'youtube') return `<div class="video-thumb" style="position:relative;width:100%;height:100%;"><img src="https://img.youtube.com/vi/${media.id}/mqdefault.jpg" style="width:100%;height:100%;object-fit:cover;" alt="" onerror="this.style.display='none'"><div class="play-icon" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);">▶</div></div>`;
  if (media.type === 'video') return `<div class="video-thumb"><div class="play-icon">▶</div></div>`;
  if (media.type === 'embed') return `<div class="video-thumb"><div class="play-icon">▶</div></div>`;
  return '<div class="no-media">미디어 없음</div>';
}

// ── 본문 텍스트 추출 ──────────────────────────────────────────
function renderRichText(richTextArr) {
  if (!richTextArr || !richTextArr.length) return '';
  return richTextArr.map(t => {
    let text = t.plain_text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const a = t.annotations || {};
    if (a.bold) text = `<strong>${text}</strong>`;
    if (a.italic) text = `<em>${text}</em>`;
    if (a.strikethrough) text = `<s>${text}</s>`;
    if (a.underline) text = `<u>${text}</u>`;
    if (a.code) text = `<code style="background:#f0f0f0;padding:1px 4px;border-radius:3px;font-size:12px;">${text}</code>`;
    if (a.color && a.color !== 'default') {
      const colorMap = {
        gray:'#888', brown:'#9b6b4b', orange:'#d97706', yellow:'#b8860b',
        green:'#16a34a', blue:'#2563eb', purple:'#7c3aed', pink:'#db2777', red:'#dc2626',
        gray_background:'#f0f0f0', brown_background:'#fdf0e8', orange_background:'#fff7ed',
        yellow_background:'#fefce8', green_background:'#f0fdf4', blue_background:'#eff6ff',
        purple_background:'#faf5ff', pink_background:'#fdf2f8', red_background:'#fef2f2'
      };
      const c = colorMap[a.color];
      if (c) {
        const isBackground = a.color.includes('background');
        text = isBackground
          ? `<span style="background:${c};padding:1px 3px;border-radius:3px;">${text}</span>`
          : `<span style="color:${c};">${text}</span>`;
      }
    }
    if (t.href) text = `<a href="${t.href}" target="_blank" style="color:#3b82f6;text-decoration:underline;">${text}</a>`;
    return text;
  }).join('');

  // 더 불러오기 버튼
  if (hasMore) {
    gallery.innerHTML += `<div class="load-more-wrap">
      <button class="load-more-btn" onclick="fetchMorePages()">↓ 20개 더 불러오기</button>
      <span class="load-more-count">현재 ${pages.length}개 표시 중</span>
    </div>`;
  } else if (pages.length > PAGE_SIZE) {
    gallery.innerHTML += `<div class="load-more-wrap"><span class="load-more-count">총 ${pages.length}개 모두 표시됨</span></div>`;
  }
}

function extractBodyText(blocks) {
  const lines = [];
  for (const block of blocks) {
    const type = block.type;
    const getText = (b, key) => renderRichText(b[key]?.rich_text) || '';
    if (type === 'paragraph') {
      const t = getText(block, 'paragraph');
      if (t) lines.push(`<div class="block-text">${t}</div>`);
    } else if (type === 'heading_1') {
      lines.push(`<div class="block-heading block-heading-1">${getText(block, 'heading_1')}</div>`);
    } else if (type === 'heading_2') {
      lines.push(`<div class="block-heading block-heading-2">${getText(block, 'heading_2')}</div>`);
    } else if (type === 'heading_3') {
      lines.push(`<div class="block-heading block-heading-3">${getText(block, 'heading_3')}</div>`);
    } else if (type === 'bulleted_list_item') {
      lines.push(`<div class="block-bulleted">${getText(block, 'bulleted_list_item')}</div>`);
      if (block.children?.length) lines.push(`<div style="padding-left:16px;">${extractBodyText(block.children)}</div>`);
    } else if (type === 'numbered_list_item') {
      lines.push(`<div class="block-numbered">${getText(block, 'numbered_list_item')}</div>`);
      if (block.children?.length) lines.push(`<div style="padding-left:16px;">${extractBodyText(block.children)}</div>`);
    } else if (type === 'quote') {
      lines.push(`<div class="block-quote">${getText(block, 'quote')}</div>`);
    } else if (type === 'toggle') {
      const toggleLabel = getText(block, 'toggle');
      const innerContent = block.children ? extractBodyText(block.children) : '';
      const tid = 'tg_' + Math.random().toString(36).slice(2);
      lines.push(`<div class="toggle-section" style="margin:4px 0;">
        <button class="toggle-header" data-toggle="${tid}" style="font-size:13px;padding:8px 12px;">
          <span>${toggleLabel}</span><span class="toggle-arrow" id="arr_${tid}">▼</span>
        </button>
        <div class="toggle-body" id="${tid}">${innerContent}</div>
      </div>`);
    } else if (type === 'column_list' || type === 'column') {
      if (block.children) lines.push(extractBodyText(block.children));
    }
  }
  return lines.join('');
}

// ── 반응 이모지 ──────────────────────────────────────────
function nl2br(text) {
  if (!text) return '';
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function getTotalReactions(pageId) {
  // 공감수 속성이 존재하면(null 포함) Notion 기준으로 처리
  // null = Notion에 속성은 있으나 값 미입력 → 0으로 취급
  const page = allPages.find(p => p._id === pageId);
  const prop = page?.properties?.['공감수'];
  if (prop !== undefined) return prop?.number ?? 0;
  // fallback: Notion 속성 자체가 없을 때만 localStorage 합산
  const r = reactionData[pageId] || {};
  return Object.entries(r)
    .filter(([k, v]) => !k.startsWith('_user_') && typeof v === 'number')
    .reduce((sum, [, v]) => sum + v, 0);
}

function getNotionDetail(pageId) {
  const page = allPages.find(p => p._id === pageId);
  const raw = page?.properties?.['공감 상세']?.rich_text?.[0]?.plain_text || '{}';
  try { return JSON.parse(raw); } catch { return {}; }
}

function buildReactionHTML(pageId) {
  const r = reactionData[pageId] || {};
  const notionDetail = getNotionDetail(pageId);
  // DEFAULT + 커스텀 이모지 모두 포함 (로컬 + Notion 키 합집합)
  const notionEmojis = Object.keys(notionDetail).filter(k => !DEFAULT_REACTIONS.includes(k));
  const localEmojis = Object.keys(r).filter(k => !k.startsWith('_user_') && !DEFAULT_REACTIONS.includes(k) && !notionEmojis.includes(k));
  const allEmojis = [...DEFAULT_REACTIONS, ...notionEmojis, ...localEmojis];
  let html = allEmojis.map(emoji => {
    // 이모지별 카운트: Notion 우선, 없으면 로컬
    const count = notionDetail[emoji] ?? r[emoji] ?? 0;
    if (!count && !DEFAULT_REACTIONS.includes(emoji)) return '';
    const active = r[`_user_${emoji}`] ? 'active' : '';
    return `<button class="reaction-btn ${active}" data-page="${pageId}" data-emoji="${emoji}">${emoji}<span class="reaction-count">${count||''}</span></button>`;
  }).join('');
  html += `<button class="add-reaction-btn" data-page="${pageId}">+</button>`;
  const total = getTotalReactions(pageId);
  if (total > 0) html += `<span class="reaction-total">총 ${total}</span>`;
  return html;
}

// ── 갤러리 이벤트 ──────────────────────────────────────────
document.getElementById('gallery').addEventListener('click', (e) => {
  const rb = e.target.closest('.reaction-btn');
  if (rb) {
    e.stopPropagation();
    const pageId = rb.dataset.page, emoji = rb.dataset.emoji;
    if (!reactionData[pageId]) reactionData[pageId] = {};
    const uk = `_user_${emoji}`, had = reactionData[pageId][uk];
    const delta = had ? -1 : 1;
    reactionData[pageId][emoji] = (reactionData[pageId][emoji] || 0) + delta;
    if (reactionData[pageId][emoji] <= 0) delete reactionData[pageId][emoji];
    reactionData[pageId][uk] = !had;
    saveReactions();
    syncReactionToNotion(pageId, emoji, delta);
    rb.closest('.card')?.querySelector('.card-reactions')?.setOf?.();
    const card = rb.closest('.card');
    if (card) card.querySelector('.card-reactions').innerHTML = buildReactionHTML(pageId);
    return;
  }
  const ab = e.target.closest('.add-reaction-btn');
  if (ab) {
    e.stopPropagation();
    const pageId = ab.dataset.page;
    const picker = document.getElementById('emojiPicker');
    picker.innerHTML = EXTRA_EMOJIS.map(em =>
      `<span class="emoji-option" data-page="${pageId}" data-emoji="${em}">${em}</span>`
    ).join('');
    const rect = ab.getBoundingClientRect();
    picker.style.top = (rect.bottom + 4) + 'px';
    picker.style.left = rect.left + 'px';
    picker.classList.toggle('show');
    return;
  }
  // 카드 이미지 클릭 → 라이트박스 (이미지만)
  const cardImg = e.target.closest('.card-media img');
  if (cardImg) { e.stopPropagation(); openLightbox(cardImg.src); return; }
  // 카드 클릭 → 모달
  const card = e.target.closest('.card');
  if (card) openModal(card.dataset.pageId);
});

document.getElementById('emojiPicker').addEventListener('click', e => {
  const opt = e.target.closest('.emoji-option');
  if (!opt) return;
  const { page: pageId, emoji } = opt.dataset;
  document.getElementById('emojiPicker').classList.remove('show');

  const uk = `_user_${emoji}`, had = reactionData[pageId][uk];
  const delta = had ? -1 : 1;
  reactionData[pageId][emoji] = (reactionData[pageId][emoji] || 0) + delta;
  if (reactionData[pageId][emoji] <= 0) delete reactionData[pageId][emoji];

// ── 갤러리 렌더 ──────────────────────────────────────────
function buildCardHTML(page) {
  const props = page.properties;
  const title = props['콘텐츠']?.title?.map(t => t.plain_text).join('') || '(제목 없음)';
  const brand = props['브랜드명']?.select?.name || '';
  const date = props['날짜']?.date?.start || '';
  const copyTypes = props['카피 유형']?.multi_select?.map(t => t.name) || [];
  const overview = props['브랜드 개요']?.rich_text?.map(t => t.plain_text).join('') || '';
  const tags = props['태그']?.multi_select?.map(t => t.name) || [];
  const media = extractFirstMedia(page.blocks || []);
  const hasBrand = !!brand, hasTypes = copyTypes.length > 0;
  const divider = hasBrand && hasTypes ? '<span class="badge-divider"></span>' : '';
  return `<div class="card" data-page-id="${page._id}">
    <div class="card-media">${buildCardMediaHTML(media)}</div>
    <div class="card-body">
      <div class="badge-row">
        ${brand ? `<span class="card-brand">${brand}</span>` : ''}
        ${divider}
        ${copyTypes.map(t => `<span class="card-type">${t}</span>`).join('')}
      </div>
      <div class="card-title">${title}</div>
      <div class="card-date">${date}</div>
      ${overview ? `<div class="card-overview-label">브랜드 개요</div><div class="card-overview">${overview}</div>` : ''}
    </div>
    ${tags.length ? `<div class="card-tags">${tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>` : ''}
    <div class="card-reactions">${buildReactionHTML(page._id)}</div>
  </div>`;
}

function renderGallery(pages, isAppend = false) {
  const gallery = document.getElementById('gallery');
  if (!pages.length && !isAppend) {
    gallery.innerHTML = '<div class="loading">등록된 레퍼런스가 없습니다</div>';
    return;
  }
  // 기존 더보기 버튼 제거
  const existing = gallery.querySelector('.load-more-wrap');
  if (existing) existing.remove();

  if (isAppend) {
    // 새 카드만 추가
    const frag = document.createDocumentFragment();
    pages.forEach(page => {
      const div = document.createElement('div');
      div.innerHTML = buildCardHTML(page);
      frag.appendChild(div.firstElementChild);
    });
    gallery.appendChild(frag);
  } else {
    gallery.innerHTML = pages.map(buildCardHTML).join('');
  }

  // 더보기 버튼
  if (hasMore) {
    const wrap = document.createElement('div');
    wrap.className = 'load-more-wrap';
    wrap.innerHTML = `<button class="load-more-btn" id="loadMoreBtn">↓ 20개 더 불러오기</button>
      <span class="load-more-count">현재 ${allPages.length}개 표시 중</span>`;
    wrap.querySelector('#loadMoreBtn').addEventListener('click', fetchMorePages);
    gallery.appendChild(wrap);
  }
  // 검색어가 있으면 새로 렌더된 카드에도 필터 적용
  if (textSearchQuery) applyTextSearch();
}

// ── 캐러셀 ──────────────────────────────────────────
function renderCarousel(mediaItems) {
  carouselItems = mediaItems; carouselIndex = 0;
  const track = document.getElementById('carouselTrack');
  const footer = document.getElementById('carouselFooter');
  const counter = document.getElementById('carouselCounter');
  const dots = document.getElementById('carouselDots');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  if (!mediaItems.length) {
    track.innerHTML = '<div class="carousel-slide"><div class="no-media">미디어 없음</div></div>';
    footer.style.display = 'none'; prevBtn.classList.add('hidden'); nextBtn.classList.add('hidden');
    return;
  }

  track.innerHTML = mediaItems.map(m => {
    let inner = '';
    if (m.type === 'image') inner = `<img src="${m.url}" alt="" data-lightbox="${m.url}" style="max-width:100%;max-height:100%;object-fit:contain;cursor:zoom-in;">`;
    else if (m.type === 'youtube') inner = `<iframe src="https://www.youtube.com/embed/${m.id}" allowfullscreen style="width:100%;aspect-ratio:16/9;border:none;"></iframe>`;
    else if (m.type === 'video') inner = `<video src="${m.url}" controls style="max-width:100%;max-height:100%;"></video>`;
    else if (m.type === 'embed') inner = `<iframe src="${m.url}" allowfullscreen style="width:100%;aspect-ratio:16/9;border:none;"></iframe>`;
    return `<div class="carousel-slide">${inner}</div>`;
  }).join('');

  track.querySelectorAll('img[data-lightbox]').forEach(img => {
    img.addEventListener('click', () => openLightbox(img.dataset.lightbox));
  });

  if (mediaItems.length > 1) {
    footer.style.display = 'flex';
    counter.textContent = `1 / ${mediaItems.length}`;
    dots.innerHTML = mediaItems.map((_, i) =>
      `<button class="carousel-dot ${i===0?'active':''}" data-index="${i}"></button>`
    ).join('');
    dots.querySelectorAll('.carousel-dot').forEach(dot => {
      dot.addEventListener('click', () => goToSlide(parseInt(dot.dataset.index)));
    });
    prevBtn.classList.remove('hidden'); nextBtn.classList.remove('hidden');
  } else {
    footer.style.display = 'none'; prevBtn.classList.add('hidden'); nextBtn.classList.add('hidden');
  }
  updateCarousel();
}

function updateCarousel() {
  document.getElementById('carouselTrack').style.transform = `translateX(-${carouselIndex * 100}%)`;
  document.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === carouselIndex));
  const counter = document.getElementById('carouselCounter');
  if (carouselItems.length > 1) counter.textContent = `${carouselIndex + 1} / ${carouselItems.length}`;
}

function moveCarousel(dir) {
  if (carouselItems.length < 2) return;
  carouselIndex = (carouselIndex + dir + carouselItems.length) % carouselItems.length;
  updateCarousel();
}

function goToSlide(i) { carouselIndex = i; updateCarousel(); }

// ── 라이트박스 ──────────────────────────────────────────
function setLightboxZoom(mode) {
  const img = document.getElementById('lightboxImg');
  img.className = '';
  if (mode === 'fit') img.classList.add('fit-screen');
  else if (mode === 'original') img.classList.add('zoom-original');
  else if (mode === 'zoomin') img.classList.add('zoom-in');

  document.getElementById({fit:'lbFit',original:'lbOriginal',zoomin:'lbZoomIn'}[mode]).classList.add('active');
}
function openLightbox(url) {

// ── 인라인 편집 ──────────────────────────────────────────
function buildEditableField(label, value, fieldKey, pageId, isTextarea = false) {
  const id = `field_${fieldKey.replace(/[^a-zA-Z0-9]/g, '_')}_${pageId}`;
  const editBtn = isEditMode ? `<button class="field-edit-btn" onclick="startInlineEdit('${id}', '${fieldKey}', '${pageId}')" title="${label} 편집">✏️</button>` : '';
  const tag = isTextarea ? 'textarea' : 'input';
  return `
    <div class="inline-edit-wrap" id="wrap_${id}">
      <div class="field-row">
        <div style="flex:1">${value}</div>
        ${editBtn}
      </div>
      <div id="edit_${id}" style="display:none;">
        <${tag} id="input_${id}" ${isTextarea ? '' : 'type="text"'} style="width:100%;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit;${isTextarea?'min-height:80px;resize:vertical;':''}">${isTextarea ? value : ''}</${tag}>
        ${!isTextarea ? '' : ''}
        <div class="inline-edit-actions">
          <button class="inline-cancel-btn" onclick="cancelInlineEdit('${id}')">취소</button>
          <button class="inline-save-btn" onclick="saveInlineEdit('${id}', '${fieldKey}', '${pageId}')">저장</button>
        </div>
      </div>
    </div>`;
}

function startInlineEdit(id, fieldKey, pageId) {
  document.getElementById(`edit_${id}`).style.display = 'block';
  const input = document.getElementById(`input_${id}`);
  if (!input) return;
  const page = allPages.find(p => p._id === pageId);
  if (!page) return;
  const props = page.properties;
  let val = '';
  if (fieldKey === '콘텐츠') val = props['콘텐츠']?.title?.map(t => t.plain_text).join('') || '';
  else if (fieldKey === '날짜') val = props['날짜']?.date?.start || '';
  else val = props[fieldKey]?.rich_text?.map(t => t.plain_text).join('') || '';
  if (input.tagName === 'TEXTAREA') input.value = val;
  else input.value = val;
  input.focus();
}

function cancelInlineEdit(id) {
  document.getElementById(`edit_${id}`).style.display = 'none';
}

async function saveInlineEdit(id, fieldKey, pageId) {
  const input = document.getElementById(`input_${id}`);
  const value = input.value;
  const saveBtn = document.querySelector(`#edit_${id} .inline-save-btn`);
  saveBtn.textContent = '저장 중...';
  saveBtn.disabled = true;

  const rawId = pageId.replace(/(.{8})(.{4})(.{4})(.{4})(.{12})/, '$1-$2-$3-$4-$5');
  const properties = {};
  properties[fieldKey] = value;

  try {
    const res = await fetch('/api/notion?action=updatePage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pageId: rawId, properties })
    });
    if (!res.ok) throw new Error('저장 실패');
    // 로컬 데이터 업데이트
    const page = allPages.find(p => p._id === pageId);
    if (page) {
      const props = page.properties;
      if (fieldKey === '콘텐츠') props['콘텐츠'].title = [{ plain_text: value }];
      else if (fieldKey === '날짜') props['날짜'].date = { start: value };
      else if (props[fieldKey]?.rich_text !== undefined) props[fieldKey].rich_text = [{ plain_text: value }];
    }
    document.getElementById(`edit_${id}`).style.display = 'none';
    openModal(pageId); // 모달 새로고침
  } catch(err) {
    alert('저장 오류: ' + err.message);
    saveBtn.textContent = '저장';
    saveBtn.disabled = false;
  }
}


// ── 편집 모드 미디어 관리 ──────────────────────────────────────────
function buildEditMediaSection(mediaItems, pageId) {
  const items = mediaItems.map((m, i) => {
    let thumb = '';
    let label = '';
    if (m.type === 'image') {
      thumb = `<img class="edit-media-thumb" src="${m.url}" alt="">`;
      label = m.url.length > 40 ? m.url.slice(0, 40) + '...' : m.url;
    } else if (m.type === 'youtube') {
      thumb = `<img class="edit-media-thumb" src="https://img.youtube.com/vi/${m.id}/default.jpg" alt="">`;
      label = `youtube: ${m.id}`;
    } else {
      thumb = `<div class="edit-media-thumb" style="display:flex;align-items:center;justify-content:center;font-size:16px;">▶</div>`;
      label = m.url ? (m.url.length > 40 ? m.url.slice(0,40)+'...' : m.url) : 'media';
    }
    const dataUrl = m.type === 'youtube'
      ? `https://www.youtube.com/watch?v=${m.id}`
      : (m.url || '');
    return `<div class="edit-media-item" draggable="true" data-index="${i}" data-page="${pageId}" data-original-url="${dataUrl}">
      <span style="color:#ccc;cursor:grab;font-size:14px;user-select:none;">⠿</span>
      ${thumb}
      <span class="edit-media-url">${label}</span>
      <button class="edit-media-remove" onclick="removeEditMedia(this, '${pageId}')">✕</button>
    </div>`;
  }).join('');

  return `<div class="edit-media-section">
    <label>미디어 순서 편집</label>
    <div style="font-size:11px;color:#f59e0b;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:7px 10px;margin-bottom:8px;line-height:1.5;">
      ⚠️ 노션에서 직접 업로드한 파일은 순서 변경 시 오류가 발생할 수 있어요.<br>
      <span style="color:#aaa;">(외부 URL로 첨부한 이미지는 괜찮아요)</span>
    </div>
    <div class="edit-media-list" id="editMediaList_${pageId}">${items}</div>
    <div class="edit-media-add-input">
      <input type="text" id="editMediaNewUrl_${pageId}" placeholder="이미지 URL 또는 유튜브 링크 추가">
      <button class="edit-media-add-btn" onclick="addEditMedia('${pageId}')">추가</button>
    </div>
    <button class="edit-media-save-btn" onclick="saveMediaOrder('${pageId}')">미디어 순서 저장</button>
  </div>`;
}

function initEditMediaDrag(pageId) {
  const list = document.getElementById(`editMediaList_${pageId}`);
  if (!list) return;
  list.querySelectorAll('.edit-media-item').forEach(item => {
    item.addEventListener('dragstart', e => {
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => item.classList.add('dragging'), 0);
    });
    item.addEventListener('dragend', () => item.classList.remove('dragging'));
    item.addEventListener('dragover', e => { e.preventDefault(); item.classList.add('drag-over'); });
    item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
    item.addEventListener('drop', e => {
      e.preventDefault();
      item.classList.remove('drag-over');
      const dragging = list.querySelector('.edit-media-item.dragging');
      if (dragging && dragging !== item) {
        const items = [...list.children];
        const fromIdx = items.indexOf(dragging);
        const toIdx = items.indexOf(item);
        if (fromIdx < toIdx) list.insertBefore(dragging, item.nextSibling);
        else list.insertBefore(dragging, item);
      }
    });
  });
}

function removeEditMedia(btn, pageId) {
  btn.closest('.edit-media-item').remove();
}

function addEditMedia(pageId) {
  const input = document.getElementById(`editMediaNewUrl_${pageId}`);
  const url = input.value.trim();
  if (!url) return;
  const list = document.getElementById(`editMediaList_${pageId}`);
  const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  const ytId = ytMatch ? ytMatch[1] : null;
  const item = document.createElement('div');
  item.className = 'edit-media-item';
  item.draggable = true;
  item.dataset.page = pageId;
  item.dataset.newUrl = url;
  const thumb = ytId
    ? `<img class="edit-media-thumb" src="https://img.youtube.com/vi/${ytId}/default.jpg" alt="">`
    : `<img class="edit-media-thumb" src="${url}" alt="" onerror="this.style.background='#eee'">`;
  const label = ytId ? `youtube: ${ytId}` : (url.length > 40 ? url.slice(0,40)+'...' : url);
  item.innerHTML = `<span style="color:#ccc;cursor:grab;font-size:14px;user-select:none;">⠿</span>${thumb}<span class="edit-media-url">${label}</span><button class="edit-media-remove" onclick="removeEditMedia(this,'${pageId}')">✕</button>`;
  list.appendChild(item);
  initEditMediaDrag(pageId);
  input.value = '';
}

async function saveMediaOrder(pageId) {
  const list = document.getElementById(`editMediaList_${pageId}`);
  if (!list) return;
  const items = [...list.querySelectorAll('.edit-media-item')];
  const mediaUrls = items.map(item => {
    // 새로 추가된 항목
    if (item.dataset.newUrl) return item.dataset.newUrl;
    // 기존 항목은 data-original-url에 원본 URL 저장됨
    return item.dataset.originalUrl || null;
  }).filter(Boolean);

  const rawId = pageId.replace(/(.{8})(.{4})(.{4})(.{4})(.{12})/, '$1-$2-$3-$4-$5');
  const saveBtn = list.parentElement.querySelector('.edit-media-save-btn');
  saveBtn.textContent = '저장 중...'; saveBtn.disabled = true;
  try {
    const res = await fetch('/api/notion?action=updateMedia', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pageId: rawId, mediaUrls })
    });
    if (!res.ok) throw new Error('저장 실패');
    await loadPages();
    openModal(pageId);
  } catch(err) {
    alert('미디어 저장 오류: ' + err.message);
    saveBtn.textContent = '미디어 순서 저장'; saveBtn.disabled = false;
  }
}

      '적용해 볼 아이디어': document.getElementById('ac-idea').value.trim(),
      '인사이트 (내가 배운 것)': document.getElementById('ac-insight').value.trim(),
      '출처 URL': document.getElementById('ac-url').value.trim(),
      '태그': document.getElementById('ac-tags').value.split(',').map(s=>s.trim()).filter(Boolean),
    },
    mediaUrls
  };

  try {
    const res = await fetch('/api/notion?action=createPage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(await res.text());
    document.getElementById('addCardOverlay').classList.remove('show');
    await loadPages();
  } catch(err) {
    alert('저장 오류: ' + err.message);
  } finally {
    saveBtn.textContent = '저장'; saveBtn.disabled = false;
  }
});


loadBrands();
loadPages();
</script>
</body>
</html>
