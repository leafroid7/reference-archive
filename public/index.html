<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H&B 케이스 스터디</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#333333">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Apple SD Gothic Neo', 'Pretendard', sans-serif; background: #f5f5f5; color: #333; }

    /* 헤더 */
    .header { background: white; padding: 20px 32px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
    .header h1 { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filter-select, .filter-date { padding: 7px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; background: white; cursor: pointer; }
    .filter-btn { padding: 7px 14px; background: #333; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .filter-btn:hover { background: #555; }
    .filter-month-btn { padding: 7px 14px; background: #f0f0f0; color: #555; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .filter-month-btn:hover { background: #e0e0e0; }
    .reset-btn { padding: 7px 14px; background: transparent; color: #888; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 13px; }

    /* 갤러리 */
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 24px 32px; align-items: start; }

    /* 카드 */
    .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .card-media { width: 100%; background: #111; overflow: hidden; aspect-ratio: 4/3; position: relative; }
    .card-media img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: zoom-in; }
    .card-media .video-thumb { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #111; position: relative; }
    .card-media .video-thumb img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
    .card-media .video-thumb .play-icon { position: absolute; width: 48px; height: 48px; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 1; }
    .card-media iframe { width: 100%; height: 100%; border: none; display: block; }
    .card-media .no-media { display: flex; align-items: center; justify-content: center; height: 100%; color: #bbb; font-size: 14px; background: #f0f0f0; }
    .card-body { padding: 14px 16px; }
    .badge-row { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; margin-bottom: 8px; }
    .badge-divider { width: 1px; height: 14px; background: #ddd; margin: 0 2px; }
    .card-brand { background: #f0f0f0; color: #555; font-size: 11px; padding: 2px 8px; border-radius: 20px; }
    .card-type { background: #e8f4ff; color: #3b82f6; font-size: 11px; padding: 2px 8px; border-radius: 20px; }
    .card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
    .card-date { font-size: 11px; color: #bbb; margin-bottom: 8px; }
    .card-overview-label { font-size: 11px; color: #aaa; font-weight: 600; margin-bottom: 3px; letter-spacing: 0.3px; }
    .card-overview { font-size: 13px; color: #555; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-tags { padding: 6px 16px 10px; display: flex; flex-wrap: wrap; gap: 4px; }
    .tag { font-size: 11px; color: #888; background: #f5f5f5; padding: 2px 8px; border-radius: 20px; }
    .card-reactions { padding: 10px 16px; border-top: 1px solid #f5f5f5; display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
    .reaction-btn { display: flex; align-items: center; gap: 3px; padding: 3px 9px; border: 1px solid #eee; border-radius: 20px; background: white; cursor: pointer; font-size: 13px; transition: background 0.15s; }
    .reaction-btn:hover, .reaction-btn.active { background: #fff3f3; border-color: #ffb3b3; }
    .reaction-count { font-size: 11px; color: #888; }
    .add-reaction-btn { padding: 3px 9px; border: 1px dashed #ddd; border-radius: 20px; background: white; cursor: pointer; font-size: 15px; color: #bbb; }

    /* 이모지 피커 */
    .emoji-picker { display: none; position: fixed; background: white; border: 1px solid #eee; border-radius: 12px; padding: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); z-index: 500; flex-wrap: wrap; gap: 6px; width: 220px; }
    .emoji-picker.show { display: flex; }
    .emoji-option { font-size: 20px; cursor: pointer; padding: 4px 6px; border-radius: 6px; }
    .emoji-option:hover { background: #f5f5f5; }

    /* 모달 오버레이 */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.show { display: flex; }

    /* 모달 본체 */
    .modal-wrap { position: relative; width: 100%; max-width: 960px; }
    .modal-close { position: absolute; top: -36px; right: 0; font-size: 22px; cursor: pointer; color: white; z-index: 10; line-height: 1; background: none; border: none; }
    .modal { background: white; border-radius: 16px; overflow: hidden; display: flex; max-height: 85vh; }

    /* 모달 좌측: 캐러셀 */
    .modal-left { flex: 0 0 55%; background: #111; position: relative; display: flex; flex-direction: column; min-height: 340px; max-height: 85vh; overflow: hidden; }
    .carousel { flex: 1; overflow: hidden; position: relative; min-height: 0; }
    .carousel-track { display: flex; height: 100%; transition: transform 0.3s ease; will-change: transform; }
    .carousel-slide { flex: 0 0 100%; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #111; overflow: hidden; }
    .carousel-slide img { max-width: 100%; max-height: 100%; object-fit: contain; cursor: zoom-in; display: block; }
    .carousel-slide iframe { width: 100%; aspect-ratio: 16/9; border: none; max-height: 100%; }
    .carousel-slide video { max-width: 100%; max-height: 100%; }
    .carousel-slide .no-media { color: #555; font-size: 14px; }

    /* 캐러셀 버튼 — 항상 DOM에 존재, show/hide로 제어 */
    .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); border: none; color: white; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; z-index: 5; transition: background 0.2s; user-select: none; }
    .carousel-btn:hover { background: rgba(255,255,255,0.35); }
    .carousel-btn.prev { left: 10px; }
    .carousel-btn.next { right: 10px; }
    .carousel-btn.hidden { display: none; }

    .carousel-footer { background: #111; padding: 8px 0; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .carousel-counter { color: rgba(255,255,255,0.6); font-size: 11px; }
    .carousel-dots { display: flex; gap: 6px; }
    .carousel-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; transition: background 0.2s; border: none; padding: 0; }
    .carousel-dot.active { background: white; }

    /* 이미지 확대 */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 600; align-items: center; justify-content: center; cursor: zoom-out; }
    .lightbox.show { display: flex; }
    .lightbox img { max-width: 92vw; max-height: 92vh; object-fit: contain; border-radius: 4px; }
    .lightbox-close { position: absolute; top: 16px; right: 20px; color: white; font-size: 28px; cursor: pointer; background: none; border: none; }

    /* 모달 우측 */
    .modal-right { flex: 1; overflow-y: auto; padding: 28px 24px; position: relative; }
    .modal-close { position: absolute; top: 14px; right: 14px; font-size: 14px; cursor: pointer; color: #999; background: #f0f0f0; border: none; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; z-index: 5; }
    .modal-close:hover { background: #e0e0e0; color: #333; }
    .modal-badge-row { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; margin-bottom: 10px; padding-right: 36px; }
    .modal-badge-divider { width: 1px; height: 14px; background: #ddd; margin: 0 2px; }
    .modal-title { font-size: 17px; font-weight: 700; line-height: 1.4; margin-bottom: 4px; }
    .modal-date { font-size: 12px; color: #bbb; margin-bottom: 16px; }
    .modal-overview-label { font-size: 11px; color: #aaa; font-weight: 600; letter-spacing: 0.3px; margin-bottom: 5px; }
    .modal-overview { font-size: 14px; color: #444; line-height: 1.7; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #f0f0f0; }
    .modal-source { margin-bottom: 14px; }
    .modal-source a { font-size: 13px; color: #3b82f6; word-break: break-all; text-decoration: none; }
    .modal-source a:hover { text-decoration: underline; }

    /* 토글 */
    .toggle-section { border: 1px solid #eee; border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
    .toggle-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; cursor: pointer; background: #fafafa; font-size: 13px; font-weight: 600; color: #444; user-select: none; border: none; width: 100%; text-align: left; }
    .toggle-header:hover { background: #f0f0f0; }
    .toggle-arrow { font-size: 10px; color: #aaa; transition: transform 0.2s; display: inline-block; }
    .toggle-arrow.open { transform: rotate(180deg); }
    .toggle-body { padding: 12px 16px; font-size: 13px; color: #555; line-height: 1.7; display: none; }
    .toggle-body.open { display: block; }
    .modal-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 16px; }

    /* 반응형 */
    @media (max-width: 700px) {
      .modal { flex-direction: column; height: 90vh; overflow: hidden; }
      .modal-left { flex: 0 0 42%; min-height: 0; max-height: none; overflow: hidden; }
      .modal-right { flex: 1; overflow-y: auto; padding: 16px; min-height: 0; }
      .carousel { height: 100%; }
      .gallery { padding: 16px; gap: 14px; }
      .header { padding: 16px; }
      .modal-badge-row { flex-direction: row; flex-wrap: wrap; padding-right: 36px; }
      .card-brand, .card-type { flex-shrink: 0; }
    }

    .loading { text-align: center; padding: 60px; color: #aaa; grid-column: 1/-1; }
    .error { text-align: center; padding: 40px; color: #e55; grid-column: 1/-1; }
  </style>
</head>
<body>

<div class="header">
  <h1>🗂 H&B 케이스 스터디</h1>
  <div class="filters">
    <select class="filter-select" id="brandFilter">
      <option value="">전체 브랜드</option>
    </select>
    <input type="date" class="filter-date" id="dateStart">
    <span style="color:#ccc;font-size:13px;">~</span>
    <input type="date" class="filter-date" id="dateEnd">
    <button class="filter-month-btn" onclick="applyMonthFilter()">최근 1개월</button>
    <button class="filter-btn" onclick="applyFilters()">필터 적용</button>
    <button class="reset-btn" onclick="resetFilters()">초기화</button>
  </div>
</div>

<div class="gallery" id="gallery">
  <div class="loading">로딩 중...</div>
</div>

<!-- 모달 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-wrap">
    <button class="modal-close" id="modalCloseBtn">✕</button>
    <div class="modal" id="modal">
      <div class="modal-left" id="modalLeft">
        <div class="carousel" id="carousel">
          <div class="carousel-track" id="carouselTrack"></div>
          <button class="carousel-btn prev hidden" id="prevBtn">‹</button>
          <button class="carousel-btn next hidden" id="nextBtn">›</button>
        </div>
        <div class="carousel-footer" id="carouselFooter" style="display:none">
          <div class="carousel-counter" id="carouselCounter"></div>
          <div class="carousel-dots" id="carouselDots"></div>
        </div>
      </div>
      <div class="modal-right" id="modalRight"></div>
    </div>
  </div>
</div>

<!-- 라이트박스 -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- 이모지 피커 -->
<div class="emoji-picker" id="emojiPicker"></div>

<script>
const API_BASE = '/api/notion';
const DEFAULT_REACTIONS = ['❤️', '👍', '👏', '🔥', '💡'];
const EXTRA_EMOJIS = ['😍', '🎯', '👀', '💎', '🙌', '✨', '📊', '😮', '📌', '💬'];

let allPages = [];
let reactionData = JSON.parse(localStorage.getItem('reactions') || '{}');
let carouselIndex = 0;
let carouselItems = [];
let touchStartX = 0;
let touchEndX = 0;

function saveReactions() { localStorage.setItem('reactions', JSON.stringify(reactionData)); }

// ── 이벤트 바인딩 ──────────────────────────────────────────
// 모달 닫기
document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// 캐러셀 버튼
document.getElementById('prevBtn').addEventListener('click', () => moveCarousel(-1));
document.getElementById('nextBtn').addEventListener('click', () => moveCarousel(1));

// 캐러셀 터치 스와이프
const carousel = document.getElementById('carousel');
carousel.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
carousel.addEventListener('touchend', (e) => {
  touchEndX = e.changedTouches[0].screenX;
  const diff = touchStartX - touchEndX;
  if (Math.abs(diff) > 40) moveCarousel(diff > 0 ? 1 : -1);
});

// 라이트박스
document.getElementById('lightbox').addEventListener('click', closeLightbox);
document.getElementById('lightboxClose').addEventListener('click', closeLightbox);

// 이모지 피커 닫기
document.addEventListener('click', (e) => {
  if (!e.target.closest('.add-reaction-btn') && !e.target.closest('#emojiPicker')) {
    document.getElementById('emojiPicker').classList.remove('show');
  }
});

// ── 데이터 로드 ──────────────────────────────────────────
async function loadBrands() {
  try {
    const res = await fetch(`${API_BASE}?action=getBrands`);
    const data = await res.json();
    const sel = document.getElementById('brandFilter');
    (data.brands || []).forEach(b => {
      const opt = document.createElement('option');
      opt.value = b.name; opt.textContent = b.name;
      sel.appendChild(opt);
    });
  } catch(e) { console.error(e); }
}

async function loadPages(brandFilter='', dateStart='', dateEnd='') {
  document.getElementById('gallery').innerHTML = '<div class="loading">로딩 중...</div>';
  try {
    let url = `${API_BASE}?action=getPages`;
    if (brandFilter) url += `&filter_brand=${encodeURIComponent(brandFilter)}`;
    if (dateStart) url += `&filter_date_start=${dateStart}`;
    if (dateEnd) url += `&filter_date_end=${dateEnd}`;
    const res = await fetch(url);
    const data = await res.json();
    allPages = (data.pages || []).map(p => ({ ...p, _id: p.id.replace(/-/g, '') }));
    renderGallery(allPages);
  } catch(e) {
    document.getElementById('gallery').innerHTML = `<div class="error">데이터 로드 실패: ${e.message}</div>`;
  }
}

// ── 미디어 추출 ──────────────────────────────────────────
function getYouTubeId(url) {
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

function extractAllMedia(blocks) {
  const items = [];
  for (const block of blocks) {
    if (block.type === 'image') {
      const url = block.image?.file?.url || block.image?.external?.url;
      if (url) items.push({ type: 'image', url });
    } else if (block.type === 'video') {
      const url = block.video?.file?.url || block.video?.external?.url;
      if (url) items.push({ type: 'video', url });
    } else if (block.type === 'embed') {
      const url = block.embed?.url || '';
      const ytId = getYouTubeId(url);
      if (ytId) items.push({ type: 'youtube', id: ytId });
      else if (url) items.push({ type: 'embed', url });
    } else if (block.type === 'paragraph') {
      const text = block.paragraph?.rich_text?.map(t => t.plain_text).join('') || '';
      const ytId = getYouTubeId(text);
      if (ytId) items.push({ type: 'youtube', id: ytId });
    }
  }
  return items;
}

function extractFirstMedia(blocks) {
  return extractAllMedia(blocks)[0] || null;
}

function buildCardMediaHTML(media) {
  if (!media) return '<div class="no-media">미디어 없음</div>';
  if (media.type === 'image') return `<img src="${media.url}" loading="lazy" alt="">`;
  if (media.type === 'youtube') return `<div class="video-thumb"><img src="https://img.youtube.com/vi/${media.id}/mqdefault.jpg" alt="" onerror="this.style.display='none'"><div class="play-icon">▶</div></div>`;
  if (media.type === 'video') return `<div class="video-thumb"><div class="play-icon">▶</div></div>`;
  if (media.type === 'embed') return `<div class="video-thumb"><div class="play-icon">▶</div></div>`;
  return '<div class="no-media">미디어 없음</div>';
}

// ── 반응 이모지 ──────────────────────────────────────────
function buildReactionHTML(pageId) {
  const r = reactionData[pageId] || {};
  let html = DEFAULT_REACTIONS.map(emoji => {
    const count = r[emoji] || 0;
    const active = r[`_user_${emoji}`] ? 'active' : '';
    return `<button class="reaction-btn ${active}" data-page="${pageId}" data-emoji="${emoji}">${emoji}<span class="reaction-count">${count||''}</span></button>`;
  }).join('');
  html += `<button class="add-reaction-btn" data-page="${pageId}">+</button>`;
  return html;
}

document.getElementById('gallery').addEventListener('click', (e) => {
  // 반응 버튼
  const rb = e.target.closest('.reaction-btn');
  if (rb) {
    e.stopPropagation();
    const pageId = rb.dataset.page;
    const emoji = rb.dataset.emoji;
    if (!reactionData[pageId]) reactionData[pageId] = {};
    const uk = `_user_${emoji}`;
    const had = reactionData[pageId][uk];
    reactionData[pageId][emoji] = (reactionData[pageId][emoji] || 0) + (had ? -1 : 1);
    if (reactionData[pageId][emoji] <= 0) delete reactionData[pageId][emoji];
    reactionData[pageId][uk] = !had;
    saveReactions();
    const card = rb.closest('.card');
    if (card) card.querySelector('.card-reactions').innerHTML = buildReactionHTML(pageId);
    return;
  }
  // 이모지 추가 버튼
  const ab = e.target.closest('.add-reaction-btn');
  if (ab) {
    e.stopPropagation();
    const pageId = ab.dataset.page;
    const picker = document.getElementById('emojiPicker');
    picker.innerHTML = EXTRA_EMOJIS.map(em =>
      `<span class="emoji-option" data-page="${pageId}" data-emoji="${em}">${em}</span>`
    ).join('');
    const rect = ab.getBoundingClientRect();
    picker.style.top = (rect.bottom + 4) + 'px';
    picker.style.left = rect.left + 'px';
    picker.classList.toggle('show');
    return;
  }
  // 카드 클릭 → 모달 열기
  const card = e.target.closest('.card');
  if (card) openModal(card.dataset.pageId);
});

document.getElementById('emojiPicker').addEventListener('click', (e) => {
  const opt = e.target.closest('.emoji-option');
  if (!opt) return;
  const pageId = opt.dataset.page;
  const emoji = opt.dataset.emoji;
  document.getElementById('emojiPicker').classList.remove('show');
  if (!reactionData[pageId]) reactionData[pageId] = {};
  const uk = `_user_${emoji}`;
  const had = reactionData[pageId][uk];
  reactionData[pageId][emoji] = (reactionData[pageId][emoji] || 0) + (had ? -1 : 1);
  if (reactionData[pageId][emoji] <= 0) delete reactionData[pageId][emoji];
  reactionData[pageId][uk] = !had;
  saveReactions();
  document.querySelectorAll('.card').forEach(card => {
    if (card.dataset.pageId === pageId)
      card.querySelector('.card-reactions').innerHTML = buildReactionHTML(pageId);
  });
});

// ── 갤러리 렌더 ──────────────────────────────────────────
function renderGallery(pages) {
  const gallery = document.getElementById('gallery');
  if (!pages.length) { gallery.innerHTML = '<div class="loading">등록된 레퍼런스가 없습니다</div>'; return; }
  gallery.innerHTML = pages.map(page => {
    const props = page.properties;
    const title = props['콘텐츠']?.title?.map(t => t.plain_text).join('') || '(제목 없음)';
    const brand = props['브랜드명']?.select?.name || '';
    const date = props['날짜']?.date?.start || '';
    const copyTypes = props['카피 유형']?.multi_select?.map(t => t.name) || [];
    const overview = props['브랜드 개요']?.rich_text?.map(t => t.plain_text).join('') || '';
    const tags = props['태그']?.multi_select?.map(t => t.name) || [];
    const media = extractFirstMedia(page.blocks || []);

    const hasBrand = !!brand;
    const hasTypes = copyTypes.length > 0;
    const divider = hasBrand && hasTypes ? '<span class="badge-divider"></span>' : '';

    return `
      <div class="card" data-page-id="${page._id}">
        <div class="card-media">${buildCardMediaHTML(media)}</div>
        <div class="card-body">
          <div class="badge-row">
            ${brand ? `<span class="card-brand">${brand}</span>` : ''}
            ${divider}
            ${copyTypes.map(t => `<span class="card-type">${t}</span>`).join('')}
          </div>
          <div class="card-title">${title}</div>
          <div class="card-date">${date}</div>
          ${overview ? `<div class="card-overview-label">브랜드 개요</div><div class="card-overview">${overview}</div>` : ''}
        </div>
        ${tags.length ? `<div class="card-tags">${tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>` : ''}
        <div class="card-reactions">${buildReactionHTML(page._id)}</div>
      </div>`;
  }).join('');
}

// ── 캐러셀 ──────────────────────────────────────────
function renderCarousel(mediaItems) {
  carouselItems = mediaItems;
  carouselIndex = 0;

  const track = document.getElementById('carouselTrack');
  const footer = document.getElementById('carouselFooter');
  const counter = document.getElementById('carouselCounter');
  const dots = document.getElementById('carouselDots');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  if (!mediaItems.length) {
    track.innerHTML = '<div class="carousel-slide"><div class="no-media">미디어 없음</div></div>';
    footer.style.display = 'none';
    prevBtn.classList.add('hidden');
    nextBtn.classList.add('hidden');
    return;
  }

  track.innerHTML = mediaItems.map((m) => {
    let inner = '';
    if (m.type === 'image') inner = `<img src="${m.url}" alt="" data-lightbox="${m.url}">`;
    else if (m.type === 'youtube') inner = `<iframe src="https://www.youtube.com/embed/${m.id}" allowfullscreen></iframe>`;
    else if (m.type === 'video') inner = `<video src="${m.url}" controls style="max-width:100%;max-height:100%"></video>`;
    else if (m.type === 'embed') inner = `<iframe src="${m.url}" allowfullscreen style="width:100%;aspect-ratio:16/9"></iframe>`;
    return `<div class="carousel-slide">${inner}</div>`;
  }).join('');

  // 이미지 클릭 → 라이트박스
  track.querySelectorAll('img[data-lightbox]').forEach(img => {
    img.addEventListener('click', () => openLightbox(img.dataset.lightbox));
  });

  if (mediaItems.length > 1) {
    footer.style.display = 'flex';
    counter.textContent = `1 / ${mediaItems.length}`;
    dots.innerHTML = mediaItems.map((_, i) =>
      `<button class="carousel-dot ${i===0?'active':''}" data-index="${i}"></button>`
    ).join('');
    dots.querySelectorAll('.carousel-dot').forEach(dot => {
      dot.addEventListener('click', () => goToSlide(parseInt(dot.dataset.index)));
    });
    prevBtn.classList.remove('hidden');
    nextBtn.classList.remove('hidden');
  } else {
    footer.style.display = 'none';
    prevBtn.classList.add('hidden');
    nextBtn.classList.add('hidden');
  }

  updateCarousel();
}

function updateCarousel() {
  const track = document.getElementById('carouselTrack');
  track.style.transform = `translateX(-${carouselIndex * 100}%)`;
  document.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === carouselIndex));
  const counter = document.getElementById('carouselCounter');
  if (carouselItems.length > 1) counter.textContent = `${carouselIndex + 1} / ${carouselItems.length}`;
}

function moveCarousel(dir) {
  if (carouselItems.length < 2) return;
  carouselIndex = (carouselIndex + dir + carouselItems.length) % carouselItems.length;
  updateCarousel();
}

function goToSlide(i) {
  carouselIndex = i;
  updateCarousel();
}

// ── 라이트박스 ──────────────────────────────────────────
function openLightbox(url) {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
}

// ── 본문 텍스트 추출 ──────────────────────────────────────────
function renderRichText(arr) {
  if (!arr?.length) return '';
  return arr.map(t => {
    let text = t.plain_text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const a = t.annotations || {};
    if (a.bold) text = `<strong>${text}</strong>`;
    if (a.italic) text = `<em>${text}</em>`;
    if (a.strikethrough) text = `<s>${text}</s>`;
    if (a.underline) text = `<u>${text}</u>`;
    if (a.code) text = `<code style="background:#f0f0f0;padding:1px 4px;border-radius:3px;font-size:12px;">${text}</code>`;
    if (a.color && a.color !== 'default') {
      const colorMap = {gray:'#888',brown:'#9b6b4b',orange:'#d97706',yellow:'#b8860b',green:'#16a34a',blue:'#2563eb',purple:'#7c3aed',pink:'#db2777',red:'#dc2626',gray_background:'#f0f0f0',brown_background:'#fdf0e8',orange_background:'#fff7ed',yellow_background:'#fefce8',green_background:'#f0fdf4',blue_background:'#eff6ff',purple_background:'#faf5ff',pink_background:'#fdf2f8',red_background:'#fef2f2'};
      const c = colorMap[a.color];
      if (c) text = a.color.includes('background') ? `<span style="background:${c};padding:1px 3px;border-radius:3px;">${text}</span>` : `<span style="color:${c};">${text}</span>`;
    }
    if (t.href) text = `<a href="${t.href}" target="_blank" style="color:#3b82f6;text-decoration:underline;">${text}</a>`;
    return text;
  }).join('');
}

function extractBodyText(blocks) {
  const lines = [];
  for (const block of blocks) {
    const type = block.type;
    const getText = (b, key) => renderRichText(b[key]?.rich_text) || '';
    if (type === 'paragraph') { const t = getText(block,'paragraph'); if (t) lines.push(`<div style="white-space:pre-wrap;margin-bottom:4px;">${t}</div>`); }
    else if (type === 'heading_1') lines.push(`<div style="font-weight:700;font-size:15px;margin:8px 0 4px;">${getText(block,'heading_1')}</div>`);
    else if (type === 'heading_2') lines.push(`<div style="font-weight:700;font-size:14px;margin:8px 0 4px;">${getText(block,'heading_2')}</div>`);
    else if (type === 'heading_3') lines.push(`<div style="font-weight:700;font-size:13px;margin:8px 0 4px;">${getText(block,'heading_3')}</div>`);
    else if (type === 'bulleted_list_item') {
      lines.push(`<div style="padding-left:14px;position:relative;margin-bottom:3px;"><span style="position:absolute;left:4px;color:#aaa;">•</span>${getText(block,'bulleted_list_item')}</div>`);
      if (block.children?.length) lines.push(`<div style="padding-left:16px;">${extractBodyText(block.children)}</div>`);
    } else if (type === 'numbered_list_item') {
      lines.push(`<div style="padding-left:14px;margin-bottom:3px;">${getText(block,'numbered_list_item')}</div>`);
      if (block.children?.length) lines.push(`<div style="padding-left:16px;">${extractBodyText(block.children)}</div>`);
    } else if (type === 'quote') {
      lines.push(`<div style="border-left:3px solid #eee;padding-left:10px;color:#777;font-style:italic;margin:4px 0;">${getText(block,'quote')}</div>`);
    } else if (type === 'toggle') {
      const label = getText(block,'toggle');
      const inner = block.children ? extractBodyText(block.children) : '';
      const tid = 'tg_'+Math.random().toString(36).slice(2);
      lines.push(`<div class="toggle-section" style="margin:4px 0;"><button class="toggle-header" data-toggle="${tid}"><span>${label}</span><span class="toggle-arrow" id="arr_${tid}">▼</span></button><div class="toggle-body" id="${tid}">${inner}</div></div>`);
    } else if (type === 'column_list' || type === 'column') {
      if (block.children) lines.push(extractBodyText(block.children));
    }
  }
  return lines.join('');
}

// ── 토글 ──────────────────────────────────────────
function buildToggle(label, content) {
  if (!content) return '';
  const id = 'tg_' + Math.random().toString(36).slice(2);
  return `
    <div class="toggle-section">
      <button class="toggle-header" data-toggle="${id}">
        <span>${label}</span>
        <span class="toggle-arrow" id="arr_${id}">▼</span>
      </button>
      <div class="toggle-body" id="${id}">${content}</div>
    </div>`;
}

document.getElementById('modal').addEventListener('click', (e) => {
  const btn = e.target.closest('.toggle-header');
  if (!btn) return;
  const id = btn.dataset.toggle;
  document.getElementById(id).classList.toggle('open');
  document.getElementById('arr_' + id).classList.toggle('open');
});

// ── 모달 열기 ──────────────────────────────────────────
function openModal(pageId) {
  const page = allPages.find(p => p._id === pageId);
  if (!page) return;
  const props = page.properties;
  const title = props['콘텐츠']?.title?.map(t => t.plain_text).join('') || '';
  const brand = props['브랜드명']?.select?.name || '';
  const date = props['날짜']?.date?.start || '';
  const copyTypes = props['카피 유형']?.multi_select?.map(t => t.name) || [];
  const overview = props['브랜드 개요']?.rich_text?.map(t => t.plain_text).join('') || '';
  const campaign = props['주목할 캠페인/콘텐츠']?.rich_text?.map(t => t.plain_text).join('') || '';
  const idea = props['적용해 볼 아이디어']?.rich_text?.map(t => t.plain_text).join('') || '';
  const insight = props['인사이트 (내가 배운 것)']?.rich_text?.map(t => t.plain_text).join('') || '';
  const tags = props['태그']?.multi_select?.map(t => t.name) || [];
  const sourceUrl = props['출처 URL']?.url || '';
  const mediaItems = extractAllMedia(page.blocks || []);

  renderCarousel(mediaItems);

  const hasBrand = !!brand;
  const hasTypes = copyTypes.length > 0;
  const divider = hasBrand && hasTypes ? '<span class="modal-badge-divider"></span>' : '';

  const bodyText = extractBodyText(page.blocks || []);
  document.getElementById('modalRight').innerHTML = `
    <button class="modal-close" id="modalCloseBtn">✕</button>
    <div class="modal-badge-row">
      ${brand ? `<span class="card-brand">${brand}</span>` : ''}
      ${divider}
      ${copyTypes.map(t => `<span class="card-type">${t}</span>`).join('')}
    </div>
    <div class="modal-title">${title}</div>
    <div class="modal-date">${date}</div>
    ${overview ? `<div class="modal-overview-label">브랜드 개요</div><div class="modal-overview">${overview}</div>` : ''}
    ${sourceUrl ? `<div class="modal-source"><a href="${sourceUrl}" target="_blank">🔗 출처 바로가기</a></div>` : ''}
    ${buildToggle('주목할 캠페인/콘텐츠', campaign)}
    ${buildToggle('적용해 볼 아이디어', idea)}
    ${buildToggle('인사이트 (내가 배운 것)', insight)}
    ${buildToggle('📄 본문 내용', bodyText)}
    ${tags.length ? `<div class="modal-tags">${tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>` : ''}
  `;
  document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

// ── 필터 ──────────────────────────────────────────
function applyFilters() {
  loadPages(
    document.getElementById('brandFilter').value,
    document.getElementById('dateStart').value,
    document.getElementById('dateEnd').value
  );
}

function applyMonthFilter() {
  const end = new Date();
  const start = new Date();
  start.setMonth(start.getMonth() - 1);
  const fmt = d => d.toISOString().split('T')[0];
  document.getElementById('dateStart').value = fmt(start);
  document.getElementById('dateEnd').value = fmt(end);
  loadPages(document.getElementById('brandFilter').value, fmt(start), fmt(end));
}

function resetFilters() {
  document.getElementById('brandFilter').value = '';
  document.getElementById('dateStart').value = '';
  document.getElementById('dateEnd').value = '';
  loadPages();
}

loadBrands();
loadPages();
</script>
